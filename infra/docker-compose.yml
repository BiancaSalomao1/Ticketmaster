version: '3.8'

services:
  # 1. BANCO DE DADOS RELACIONAL (Para o order-service / Spring Boot)
  postgres:
    image: postgres:16-alpine
    container_name: ticketmaster-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ticketmaster_orders
      POSTGRES_USER: globaltech
      POSTGRES_PASSWORD: supersecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticketmaster-network

  # 2. BANCO DE DADOS NO-SQL (Para o catalog-service / Quarkus)
  mongodb:
    image: mongo:7.0
    container_name: ticketmaster-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: ticketmaster_catalog
    volumes:
      - mongodb_data:/data/db
    networks:
      - ticketmaster-network

  # 3. CACHE E IDEMPOTÊNCIA (Para controle de concorrência e travas distribuídas)
  redis:
    image: redis:7.2-alpine
    container_name: ticketmaster-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - ticketmaster-network

  # 4. MESSAGERIA - APACHE KAFKA (Modo KRaft - Sem necessidade de Zookeeper)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ticketmaster-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      # CLUSTER_ID gerado estaticamente para o modo KRaft funcionar sem zookeeper localmente
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - ticketmaster-network

  # 5. IDENTITY PROVIDER - KEYCLOAK (OAuth2 / OpenID Connect Server)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ticketmaster-keycloak
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    networks:
      - ticketmaster-network

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  ticketmaster-network:
    driver: bridge